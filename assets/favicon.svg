  <circle cx="42" cy="20" r="38" fill="none" stroke="rgba(196,85,58,0.35)" stroke-width="1.5"/>
  <circle cx="42" cy="20" r="30" fill="none" stroke="rgba(196,85,58,0.40)" stroke-width="1.5"/>
  <circle cx="42" cy="20" r="22" fill="none" stroke="rgba(196,85,58,0.45)" stroke-width="1.5"/>
  <circle cx="42" cy="20" r="14" fill="none" stroke="rgba(196,85,58,0.50)" stroke-width="1.5"/>
