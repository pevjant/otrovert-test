<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이향인 체크리스트 — 외향인도 내향인도 아닌, 제3의 기질</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f6f3ee;
  --bg2:#ede9e1;
  --surface:#fff;
  --ink:#1a1a1a;
  --ink2:#4a4540;
  --ink3:#8a8580;
  --ink4:#b5b0a8;
  --accent:#c4553a;
  --accent-soft:#f0ddd6;
  --green:#3a6b5a;
  --green-soft:#d6e8e0;
  --rule:#d5d0c8;
  --radius:12px;
}
html{font-size:16px}
body{
  font-family:'Noto Sans KR',sans-serif;
  background:var(--bg);color:var(--ink);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:url("data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.03'/%3E%3C/svg%3E");
}
.container{position:relative;z-index:1;max-width:640px;margin:0 auto;padding:0 24px}


/* ── Landing ── */
.landing{
  min-height:100vh;min-height:100dvh;
  display:flex;flex-direction:column;justify-content:flex-start;
  padding:240px 0 60px;animation:appear .6s ease-out;
}
@keyframes appear{from{opacity:0}to{opacity:1}}
.landing .kicker{
  font-size:.7rem;font-weight:700;letter-spacing:4px;text-transform:uppercase;
  color:var(--accent);margin-bottom:24px;
}
.landing h1{
  font-family:'Noto Serif KR',serif;font-weight:900;
  font-size:clamp(2rem,7vw,3.2rem);line-height:1.4;
  color:var(--ink);margin-bottom:20px;
}
.landing h1 em{font-family:'DM Serif Display',serif;font-style:italic;color:var(--accent)}
.landing .desc{
  font-size:1rem;line-height:1.75;color:var(--ink2);max-width:420px;margin-bottom:24px;
  position:relative;padding-left:16px;
}
.landing .desc-quote{
  font-family:'DM Serif Display',serif;font-size:1.5rem;
  color:var(--ink4);line-height:1;
  position:absolute;left:0;top:2px;
}
.landing .desc strong{color:var(--ink);font-weight:700}
.btn-start{
  display:inline-flex;align-items:center;gap:8px;
  min-height:50px;padding:14px 32px;border:1.5px solid var(--ink);border-radius:var(--radius);
  background:var(--ink);color:var(--bg);
  font-size:1rem;font-weight:700;font-family:inherit;
  cursor:pointer;transition:all .2s;letter-spacing:1px;align-self:flex-start;
}
.btn-start:hover{background:transparent;color:var(--ink)}
.landing .meta{
  margin-top:24px;font-size:.8rem;color:var(--ink4);
  border-top:1px solid var(--rule);padding-top:14px;max-width:300px;
}

/* ── Quiz ── */
.quiz{display:none;padding:24px 0 120px}
.quiz.active{display:block;animation:appear .4s ease-out}
.progress-wrap{
  position:sticky;top:0;z-index:10;
  background:rgba(246,243,238,.92);backdrop-filter:blur(12px);
  margin:0 -24px;padding:16px 24px 14px;border-bottom:1px solid var(--rule);
}
.progress-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
.progress-count{font-family:'Noto Serif KR',serif;font-size:.85rem;color:var(--ink3)}
.progress-count b{color:var(--accent);font-weight:700;font-size:1.1rem}
.progress-page{font-size:.75rem;color:var(--ink4);letter-spacing:1px}
.progress-bar{height:2px;background:var(--rule)}
.progress-fill{height:100%;background:var(--accent);transition:width .5s ease}

.q-group-header{display:none}

.q-card{padding:28px 0;border-bottom:1px solid var(--rule)}
.q-card:last-child{border-bottom:none}
.q-card.missed .q-text{color:var(--accent)}
.q-card.missed .q-number{color:var(--accent)}
@keyframes nudge{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.q-card.shake{animation:nudge .3s ease}
.q-head{display:flex;align-items:flex-start;gap:6px;margin-bottom:20px}
.q-number{
  font-family:'DM Serif Display',serif;font-size:1.3rem;
  color:var(--ink4);min-width:24px;line-height:1.6;transition:color .3s;
}
.q-card.answered .q-number{color:var(--accent)}
.q-text{font-size:1.06rem;line-height:1.75;color:var(--ink);font-weight:400;word-break:keep-all;overflow-wrap:break-word}

.scale{display:flex;gap:8px;padding-left:46px}
.scale-btn{
  flex:1;min-height:44px;padding:12px 4px 10px;
  border:1.5px solid var(--rule);border-radius:var(--radius);
  background:var(--surface);text-align:center;cursor:pointer;
  transition:all .2s;font-family:inherit;
  display:flex;flex-direction:column;align-items:center;gap:3px;
}
.scale-btn .score-num{font-family:'DM Serif Display',serif;font-size:1.2rem;color:var(--ink2)}
.scale-btn .score-label{font-size:.65rem;color:var(--ink3);line-height:1.3;word-break:keep-all}
.scale-btn:hover{border-color:var(--ink3);background:var(--bg2)}
.scale-btn.selected{border-color:var(--accent);background:var(--accent-soft)}
.scale-btn.selected .score-num{color:var(--accent);font-weight:700}
.scale-btn.selected .score-label{color:var(--accent)}

.nav-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:20;
  background:rgba(246,243,238,.94);backdrop-filter:blur(12px);
  border-top:1px solid var(--rule);padding:12px 24px;
}
.nav-inner{max-width:640px;margin:0 auto;display:flex;justify-content:space-between;align-items:center}
.btn-nav{
  min-height:44px;padding:12px 24px;border:1.5px solid var(--rule);border-radius:var(--radius);
  background:var(--surface);color:var(--ink2);
  font-size:.9rem;font-weight:600;font-family:inherit;cursor:pointer;transition:all .2s;
}
.btn-nav:hover{border-color:var(--ink);color:var(--ink)}
.btn-nav:disabled{opacity:.25;cursor:not-allowed}
.btn-nav.primary{border-color:var(--ink);background:var(--ink);color:var(--bg)}
.btn-nav.primary:hover{background:var(--ink2)}
.btn-nav.primary:disabled{opacity:.25}
.nav-dots{display:flex;gap:6px;align-items:center}
.nav-dot-wrap{position:relative;display:flex;align-items:center}
.nav-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--rule);transition:all .3s;cursor:pointer;
}
.nav-dot.active{background:var(--accent);transform:scale(1.4)}
.nav-dot.done{background:var(--green)}
.nav-dot.incomplete{background:var(--accent);opacity:0.4}
.nav-dot-mark{
  position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);
  font-size:7px;color:var(--accent);line-height:1;
  opacity:0;transition:opacity .3s;
}
.nav-dot-mark.visible{opacity:1}
.nav-dot-mark.visible::after{content:'^'}

/* ── Circles (shared across pages) ── */
.circles-wrap{position:fixed;top:-60px;pointer-events:none;width:320px;height:320px;overflow:visible;z-index:0;left:calc(100vw - 260px)}
.circles-wrap div.circ{position:absolute;border-radius:50%;border:1px solid rgba(196,85,58,0.06)}
.circles-wrap .c1{width:320px;height:320px;top:0;right:0}
.circles-wrap .c2{width:260px;height:260px;top:30px;right:30px}
.circles-wrap .c3{width:200px;height:200px;top:60px;right:60px}
.circles-wrap .c4{width:140px;height:140px;top:90px;right:90px}
.circles-wrap.fail div.circ{border-color:rgba(181,176,168,0.08)}
/* Letters on circles */
.circle-letter{
  position:absolute;
  font-family:'DM Serif Display',serif;
  font-style:italic;
  pointer-events:none;
  transition:opacity 0.4s ease, transform 0.4s ease, color 0.4s ease;
  white-space:nowrap;
}
.circle-letter .letter-main{font-weight:400}
.circle-letter .letter-q{font-size:0.7em;margin-left:1px}
/* Letter positions — large, I O E left to right across circles */
.circle-letter.letter-i{top:130px;left:50px;font-size:48px;color:rgba(196,85,58,0.12);--rot:rotate(-15deg);transform:var(--rot);transform-origin:center center}
.circle-letter.letter-o{top:190px;left:120px;font-size:56px;color:rgba(196,85,58,0.12);--rot:rotate(5deg);transform:var(--rot);transform-origin:center center}
.circle-letter.letter-e{top:120px;left:210px;font-size:44px;color:rgba(196,85,58,0.12);--rot:rotate(12deg);transform:var(--rot);transform-origin:center center}
/* Bounce animation — 2 jumps, second smaller */
@keyframes letterBounce{
  0%{transform:var(--rot) translateY(0)}
  18%{transform:var(--rot) translateY(-12px)}
  36%{transform:var(--rot) translateY(0)}
  52%{transform:var(--rot) translateY(-5px)}
  68%{transform:var(--rot) translateY(0)}
  100%{transform:var(--rot) translateY(0)}
}
.circle-letter.bounce{animation:letterBounce 0.45s ease-out forwards}

/* ── Result ── */
.result{display:none;padding:40px 0 80px}
.result.active{display:block;animation:appear .5s ease-out}
.result-wrap{position:relative;overflow:hidden;}
/* Kicker */
.result-kicker-row{display:flex;align-items:center;gap:10px;margin-bottom:28px}
.result-emoji{
  display:inline-flex;align-items:center;justify-content:center;
  width:40px;height:40px;border-radius:50%;font-size:20px;line-height:1;
}
.result-emoji.pass{background:radial-gradient(circle,rgba(232,168,124,0.15) 0%,rgba(196,85,58,0.06) 70%,transparent 100%)}
.result-emoji.fail{background:radial-gradient(circle,rgba(181,176,168,0.12) 0%,rgba(181,176,168,0.04) 70%,transparent 100%)}
.result-kicker{font-size:.65rem;font-weight:400;letter-spacing:0.15em;color:var(--accent)}
/* Score hero */
.result-score-num{
  font-family:'DM Serif Display',serif;
  font-size:clamp(4.5rem,15vw,5.5rem);
  font-weight:400;line-height:0.85;
  color:var(--accent);letter-spacing:-3px;display:block;
}
.result-score-sub{
  margin-top:10px;margin-bottom:28px;display:flex;align-items:baseline;gap:4px;
}
.result-score-line{width:32px;height:2px;background:var(--accent);opacity:0.35;margin-right:8px;align-self:center}
.result-score-max{font-weight:300;font-size:.8rem;color:var(--ink4);letter-spacing:0.05em}
/* Meter — thin bar style */
.result-meter{max-width:400px;margin:0 0 28px;padding:0}
.meter-track{
  position:relative;height:3px;background:var(--bg2);
  border-radius:2px;border:none;margin:0;overflow:visible;
}
.meter-fill{
  position:absolute;left:0;top:0;height:100%;border-radius:2px;
  transition:width 1.4s cubic-bezier(.22,1,.36,1);
}
.meter-fill.pass{background:linear-gradient(90deg,#d4956e,var(--accent))}
.meter-fill.fail{background:linear-gradient(90deg,var(--rule),var(--ink4))}
.meter-threshold{
  position:absolute;left:61.67%;top:-5px;
  width:1px;height:13px;background:var(--ink4);z-index:2;
}
.meter-threshold-label{
  position:absolute;left:61.67%;top:10px;
  transform:translateX(-50%);
  font-size:.6rem;color:var(--ink4);font-weight:300;letter-spacing:0.05em;white-space:nowrap;
}
.meter-dot{
  position:absolute;top:50%;transform:translate(-50%,-50%);
  width:8px;height:8px;border-radius:50%;box-shadow:0 0 0 2px var(--bg);
}
.meter-dot.pass{background:var(--accent)}
.meter-dot.fail{background:var(--ink4)}
/* Title — split style */
.result-title-pre{
  font-family:'Noto Sans KR',sans-serif;font-weight:300;
  font-size:.85rem;color:var(--ink3);letter-spacing:0.02em;display:block;margin-bottom:2px;
}
.result-type{
  font-family:'Noto Serif KR',serif;font-weight:900;
  font-size:clamp(1.5rem,5vw,1.7rem);line-height:1.3;letter-spacing:-0.03em;
}
.result-divider{
  height:1px;max-width:280px;margin:16px 0;
  background:linear-gradient(90deg,var(--rule),transparent);
}
/* Description — dynamic typography */
.result-body{max-width:480px;margin:0;position:relative;padding-left:16px}
.result-quote{
  font-family:'DM Serif Display',serif;font-size:1.5rem;
  color:var(--ink4);line-height:1;
  position:absolute;left:0;top:2px;
}
.result-desc-lead{font-weight:600;font-size:.95rem;line-height:1.6;color:var(--ink);margin:0 0 12px 0;letter-spacing:-0.01em}
.result-desc-body{font-weight:400;font-size:.82rem;line-height:1.85;color:var(--ink2);margin:0 0 10px 0;letter-spacing:0.01em}
.result-desc-detail{font-weight:300;font-size:.78rem;line-height:1.75;color:var(--ink3);margin:0 0 12px 0;letter-spacing:0.02em}
.result-desc-accent{
  font-family:'Noto Serif KR',serif;font-weight:900;
  font-size:.82rem;line-height:1.5;color:var(--accent);margin:0 0 12px 0;letter-spacing:-0.01em;
}
.result-desc-close{font-weight:400;font-size:.78rem;line-height:1.65;color:var(--ink3);margin:0;letter-spacing:0.01em}









/* ── Share Card (offscreen, captured by html2canvas) ── */
#share-card{
  position:fixed;left:-9999px;top:0;
  font-family:'Noto Sans KR',sans-serif;
  -webkit-font-smoothing:antialiased;
  z-index:-1;
}

.btn-retry{
  display:block;margin:32px auto 0;
  min-height:48px;padding:14px 32px;border:1.5px solid var(--rule);border-radius:var(--radius);
  background:transparent;color:var(--ink2);
  font-size:.9rem;font-weight:600;font-family:inherit;cursor:pointer;transition:all .2s;
}
.btn-retry:hover{border-color:var(--ink);color:var(--ink)}

.share-actions{
  display:flex;gap:12px;justify-content:center;
  margin-top:32px;padding-top:28px;border-top:1px solid var(--rule);
}
.btn-share{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  min-height:48px;padding:12px 24px;border:1.5px solid var(--rule);border-radius:var(--radius);
  background:var(--surface);color:var(--ink2);
  font-size:.9rem;font-weight:600;font-family:inherit;cursor:pointer;transition:all .2s;
}
.btn-share:hover{border-color:var(--ink);color:var(--ink)}
.btn-share svg{flex-shrink:0}
.share-toast{
  position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
  background:var(--ink);color:var(--bg);padding:14px 24px;border-radius:var(--radius);min-height:44px;
  font-size:.85rem;font-weight:500;z-index:100;
  animation:toastIn .3s ease-out;
}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* ── Mobile ── */
@media(max-width:600px){
  .container{padding:0 20px}
  .q-text{font-size:1.05rem}
  .scale{padding-left:0;gap:6px;flex-wrap:wrap}
  .scale-btn{min-width:calc(25% - 6px);min-height:44px;padding:10px 4px 8px}
  .scale-btn .score-num{font-size:1.1rem}
  .scale-btn .score-label{font-size:.6rem}
  .q-head{gap:10px}
  .q-card{padding:22px 0}
  
  .nav-bar{padding:10px 20px}
  .progress-wrap{margin:0 -20px;padding:14px 20px 12px}
  .result-score-num{font-size:4rem}
  .share-actions{flex-direction:column;gap:8px}
  .btn-share{justify-content:center}
}
@media(max-width:380px){
  .scale-btn{min-width:calc(33.3% - 6px)}
}
/* Compact quiz for iPhone 14 Pro height and smaller — fit 5 questions without scroll */
@media(max-height:860px){
  .quiz{padding:8px 0 72px}
  .q-group-header{padding:10px 0 8px;margin-bottom:0;font-size:.7rem}
  .q-card{padding:10px 0}
  .q-head{margin-bottom:8px;gap:6px}
  .q-text{font-size:.88rem;line-height:1.55}
  .q-number{font-size:1rem;min-width:28px}
  .scale{gap:4px;padding-left:0;flex-wrap:wrap}
  .scale-btn{min-height:36px;min-width:calc(25% - 4px);padding:8px 2px 6px;gap:2px}
  .scale-btn .score-num{font-size:.95rem}
  .scale-btn .score-label{font-size:.5rem}
  .progress-wrap{padding:8px 20px 6px}
  .progress-top{margin-bottom:6px}
  .nav-bar{padding:6px 20px}
  .btn-nav{min-height:40px;padding:10px 20px;font-size:.85rem}
}
/* ── Dark mode ── */
html.dark-mode{
  --bg:#141518;--bg2:#1e1f22;--surface:#1e1f22;
  --ink:#e8e5e0;--ink2:#9a9590;--ink3:#7a7570;--ink4:#5a5550;
  --accent:#e8a87c;--accent-soft:rgba(232,168,124,0.12);
  --green:#6ab89a;--green-soft:rgba(106,184,154,0.15);
  --rule:#2a2b2e;--radius:6px;
}
html.dark-mode body{background:var(--bg);color:var(--ink)}
html.dark-mode body::before{opacity:0.01}
html.dark-mode .circles-wrap div.circ{border-color:rgba(232,168,124,0.06)}
html.dark-mode .circles-wrap.fail div.circ{border-color:rgba(122,117,112,0.08)}
html.dark-mode .circle-letter{color:rgba(232,168,124,0.15)}
html.dark-mode .result-desc-accent{color:var(--accent)}
html.dark-mode .result-desc-close{color:var(--ink3)}
html.dark-mode .result-quote{color:#2a2b2e}
html.dark-mode .meter-dot{box-shadow:0 0 0 2px var(--bg)}
</style>
</head>
<body>
<!-- Shared circles — fixed to viewport -->
<div class="circles-wrap" id="global-circles" style="position:fixed;z-index:0;">
  <div class="circ c1"></div><div class="circ c2"></div><div class="circ c3"></div><div class="circ c4"></div>
  <span class="circle-letter letter-i" id="gl-i"><span class="letter-main">I</span><span class="letter-q">?</span></span>
  <span class="circle-letter letter-e" id="gl-e"><span class="letter-main">E</span><span class="letter-q">?</span></span>
  <span class="circle-letter letter-o" id="gl-o"><span class="letter-main">O</span><span class="letter-q">?</span></span>
</div>
<div class="container">
  <div class="landing" id="landing" style="position:relative;">
    <div class="kicker">이향인 체크리스트</div>
    <h1>당신은<br>어떤 사람인가요<em>?</em></h1>
    <p class="desc">
      <span class="desc-quote">"</span>
      <span style="font-weight:400">내향인</span><em style="font-family:'DM Serif Display',serif;font-style:italic;font-size:.8rem;color:var(--ink3);margin-left:1px;"><span style="font-size:.9rem;color:var(--ink2);">I</span>ntrovert</em>이라 하기엔 사교적이고,<br>
      <span style="font-weight:400">외향인</span><em style="font-family:'DM Serif Display',serif;font-style:italic;font-size:.8rem;color:var(--ink3);margin-left:1px;"><span style="font-size:.9rem;color:var(--ink2);">E</span>xtrovert</em>이라 하기엔 혼자가 편한.<br>
      어쩌면 우리에게는<br>
      <strong>새로운 이름</strong><em style="font-family:'DM Serif Display',serif;font-style:italic;font-size:.9rem;color:var(--ink3);margin-left:1px;"><span style="font-size:1rem;color:var(--ink2);">O</span>trovert</em>이 필요한 건 아닐까요?
    </p>
    <button class="btn-start" onclick="startQuiz()">테스트 시작</button>
    <p class="meta">40문항 · 약 5–7분 소요<br>라미 카민스키 박사의 이향인 체크리스트 기반</p>
    <!-- Debug panel (hidden in production) -->
    <div id="debug-panel" style="display:none;margin-top:32px;padding:16px;border:1px dashed var(--rule);border-radius:var(--radius);background:var(--surface);">
      <div style="font-size:.7rem;font-weight:700;color:var(--ink3);letter-spacing:2px;margin-bottom:12px;">DEBUG</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button onclick="debugResult(true)" style="padding:8px 16px;border:1px solid var(--accent);border-radius:var(--radius);background:transparent;color:var(--accent);font-size:.8rem;font-weight:600;cursor:pointer;font-family:inherit;">🔮 이향인 O</button>
        <button onclick="debugResult(false)" style="padding:8px 16px;border:1px solid var(--ink4);border-radius:var(--radius);background:transparent;color:var(--ink2);font-size:.8rem;font-weight:600;cursor:pointer;font-family:inherit;">🪞 이향인 X</button>
        <button onclick="document.documentElement.classList.toggle('dark-mode')" style="padding:8px 16px;border:1px solid var(--ink4);border-radius:var(--radius);background:transparent;color:var(--ink2);font-size:.8rem;font-weight:600;cursor:pointer;font-family:inherit;">🌗 다크/라이트</button>
      </div>

  {n:35,t:"나는 스스로에게 의지한다. 타인에게 도움을 청하는 것은 내게 어려운 일이다.",d:"F"},

  {n:40,t:"나는 종종 스스로에게 질문을 던진다.",d:"F"},
];

const PP=window.innerHeight<=860?4:5,TP=Math.ceil(QS.length/PP);
let cp=0,ans={};
const LB=[
  {v:7,l:"매우 그렇다"},{v:6,l:"꽤 그렇다"},{v:5,l:"그렇다"},{v:4,l:"보통이다"},
  {v:3,l:"그렇지 않다"},{v:2,l:"꽤 그렇지 않다"},{v:1,l:"전혀 그렇지 않다"}
];

function startQuiz(){
  document.getElementById('landing').style.display='none';
  document.getElementById('quiz').classList.add('active');
  document.getElementById('nav-bar').style.display='block';
  buildDots();render();
}
function buildDots(){
  const c=document.getElementById('nav-dots');c.innerHTML='';
  for(let i=0;i<TP;i++){
    const w=document.createElement('div');
    w.className='nav-dot-wrap';
    const d=document.createElement('div');
    d.className='nav-dot'+(i===0?' active':'');
    d.onclick=()=>{if(i!==cp)fadeAndGo(i);};
    const m=document.createElement('span');
    m.className='nav-dot-mark';
    w.appendChild(d);w.appendChild(m);c.appendChild(w);
  }
}
function render(){
  const area=document.getElementById('questions-area');
  const s=cp*PP,e=Math.min(s+PP,QS.length),qs=QS.slice(s,e);
  let h=`<div class="q-group"><div class="q-group-header">PART ${cp+1} / ${TP}</div>`;
  qs.forEach(q=>{
    const done=ans[q.n]!==undefined,rev=q.d==='R';
    h+=`<div class="q-card${done?' answered':''}" id="qc-${q.n}">`;
    h+=`<div class="q-head"><span class="q-number">${q.n}.</span><span class="q-text">${q.t}</span></div>`;
    h+=`<div class="scale">`;
    LB.forEach(lb=>{
      const ds=rev?(8-lb.v):lb.v;
      const sel=ans[q.n]===ds?' selected':'';
      h+=`<button class="scale-btn${sel}" onclick="pick(${q.n},${ds},this)">`;
      h+=`<span class="score-num">${ds}</span><span class="score-label">${lb.l}</span></button>`;
    });
    h+=`</div></div>`;
  });
  h+=`</div>`;area.innerHTML=h;

  document.getElementById('btn-prev').disabled=cp===0;
  updNav();
  document.querySelectorAll('.nav-dot-wrap').forEach((w,i)=>{
    const d=w.querySelector('.nav-dot');
    const m=w.querySelector('.nav-dot-mark');
    d.className='nav-dot';
    m.className='nav-dot-mark';
    if(i===cp)d.classList.add('active');
    else if(pageDone(i))d.classList.add('done');
    else if(pageStarted(i)){d.classList.add('incomplete');m.classList.add('visible');}
  });
  document.getElementById('page-label').textContent=`${cp+1} / ${TP}`;
  updProg();window.scrollTo({top:0,behavior:'smooth'});
}
function updNav(){
  const last=cp===TP-1;
  const allDone=Object.keys(ans).length===40;
  const nb=document.getElementById('btn-next');
  nb.textContent=last?'결과 보기':'다음';
  nb.disabled=last&&!allDone;
}
function pageDone(p){
  const s=p*PP,e=Math.min(s+PP,QS.length);
  for(let i=s;i<e;i++)if(ans[QS[i].n]===undefined)return false;return true;
}
function pageStarted(p){
  const s=p*PP,e=Math.min(s+PP,QS.length);
  for(let i=s;i<e;i++)if(ans[QS[i].n]!==undefined)return true;return false;
}
function pick(n,score,el){
  ans[n]=score;
  const card=document.getElementById('qc-'+n);
  card.classList.add('answered');
  card.classList.remove('missed','shake');
  card.querySelectorAll('.scale-btn').forEach(b=>b.classList.remove('selected'));
  el.classList.add('selected');
  updProg();updNav();
}
function updProg(){
  const c=Object.keys(ans).length;
  document.getElementById('answered-count').textContent=c;
  document.getElementById('progress-fill').style.width=(c/40*100)+'%';
}
function changePage(d){
  if(cp===TP-1&&d===1){
    if(Object.keys(ans).length===40){showResult();return;}
    for(let p=0;p<TP;p++){if(!pageDone(p)){fadeAndGo(p);return;}}
    return;
  }
  const next=Math.max(0,Math.min(TP-1,cp+d));
  if(next===cp)return;
  fadeAndGo(next);
}
function fadeAndGo(target){
  cp=target;render();
}

// Swipe gesture for page navigation (exclude nav-bar area)
let touchStartX=0,touchStartY=0,touchValid=false;
document.addEventListener('touchstart',e=>{
  if(!document.getElementById('quiz').classList.contains('active'))return;
  if(e.target.closest('.nav-bar')){touchValid=false;return;}
  touchValid=true;
  touchStartX=e.touches[0].clientX;
  touchStartY=e.touches[0].clientY;
},{passive:true});
document.addEventListener('touchend',e=>{
  if(!touchValid)return;
  touchValid=false;
  const dx=e.changedTouches[0].clientX-touchStartX;
  const dy=e.changedTouches[0].clientY-touchStartY;
  if(Math.abs(dx)>60&&Math.abs(dx)>Math.abs(dy)*1.5){
    if(dx<0)changePage(1);
    else changePage(-1);
  }
},{passive:true});

function showResult(){
  document.getElementById('quiz').style.display='none';
  document.getElementById('nav-bar').style.display='none';
  document.getElementById('result').classList.add('active');
  const total=Object.values(ans).reduce((a,b)=>a+b,0);
  const pct=(total-40)/240*100;
  const is188=total>=188;
  const emoji=is188?'🔮':'🪞';

  // Circles theme + letter states (shared global circles)
  const circles=document.getElementById('global-circles');
  circles.className='circles-wrap'+(is188?'':' fail');
  const rlO=document.getElementById('gl-o');
  const rlI=document.getElementById('gl-i');
  const rlE=document.getElementById('gl-e');
  if(is188){
    rlO.style.color='rgba(196,85,58,0.45)';rlO.style.transform='rotate(5deg) scale(1.25)';
    rlO.querySelector('.letter-q').style.display='none';
    rlI.style.color='rgba(196,85,58,0.06)';rlI.style.transform='rotate(-15deg) scale(1)';
    rlE.style.color='rgba(196,85,58,0.06)';rlE.style.transform='rotate(12deg) scale(1)';
  }else{

async function shareImage(){
  populateShareCard();
  const card=document.getElementById('share-card-inner');
  // Brief delay so layout settles before capture
  await new Promise(r=>setTimeout(r,80));
  try{
    const canvas=await html2canvas(card,{
      backgroundColor:null,
      scale:2,
      useCORS:true,
      allowTaint:true,
      logging:false,
    });
    canvas.toBlob(async blob=>{
      const file=new File([blob],'이향인결과.png',{type:'image/png'});
      if(navigator.canShare&&navigator.canShare({files:[file]})){
        try{await navigator.share({files:[file],title:'이향인 체크리스트 결과'})}
        catch(e){if(e.name!=='AbortError')downloadBlob(blob)}
      }else{downloadBlob(blob)}
    },'image/png');
  }catch(e){toast('이미지 생성에 실패했습니다')}
}

function downloadBlob(blob){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='이향인결과.png';a.click();
  URL.revokeObjectURL(a.href);
  toast('이미지가 저장되었습니다');
}

async function shareText(){
  const title=document.getElementById('result-title').textContent;
  const emoji=document.getElementById('result-emoji').textContent;
  const score=document.getElementById('result-num').textContent;
  const desc=document.getElementById('result-desc').innerText;
  const text=`이향인 체크리스트 결과\n\n${emoji} ${title}\n총점: ${score} / 280 (기준: 188점)\n\n${desc}\n\n나도 테스트 해보기 → ${location.href}`;
  if(navigator.share){
    try{await navigator.share({text});return}catch(e){}
  }
  try{
    await navigator.clipboard.writeText(text);
    toast('클립보드에 복사되었습니다');
  }catch(e){toast('공유에 실패했습니다')}
}
// Landing bounce — sequential with delay between: I → pause → O → pause → E
setTimeout(()=>{
  const letters=[document.getElementById('gl-i'),document.getElementById('gl-e'),document.getElementById('gl-o')];
  let i=0;
  function bounceNext(){
    if(i>=letters.length)return;
    const el=letters[i];
    if(!el){i++;bounceNext();return;}
    el.classList.add('bounce');
    el.addEventListener('animationend',()=>{
      el.classList.remove('bounce');
      i++;
      setTimeout(bounceNext,150);
    },{once:true});
  }
  bounceNext();
},800);

function debugResult(pass){
  document.getElementById('landing').style.display='none';
  document.getElementById('quiz').style.display='none';
  const quiz=document.getElementById('quiz');quiz.classList.remove('active');
  // Fill answers to get target score
  QS.forEach(q=>{ans[q.n]=pass?7:3;});
  showResult();
}
document.addEventListener('keydown',e=>{
  if(!document.getElementById('quiz').classList.contains('active'))return;
  if(e.key==='ArrowRight')changePage(1);
  if(e.key==='ArrowLeft')changePage(-1);
  const num=parseInt(e.key);
  if(num>=1&&num<=7){
    const s=cp*PP,end=Math.min(s+PP,QS.length);
    const uq=QS.slice(s,end).find(q=>ans[q.n]===undefined);
    if(!uq)return;
    const card=document.getElementById('qc-'+uq.n);
    const btn=Array.from(card.querySelectorAll('.scale-btn')).find(b=>
      parseInt(b.querySelector('.score-num').textContent)===num
    );
    if(btn)pick(uq.n,num,btn);
  }
});
